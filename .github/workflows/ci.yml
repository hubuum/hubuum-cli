name: CI and release

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:

env:
  CRATE_NAME: hubuum-cli
  GITHUB_TOKEN: ${{ github.token }}
  RUST_BACKTRACE: 1

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install clippy
        run: rustup component add clippy

      - name: Run clippy
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v18
        with:
          config: ".markdownlint.json"
          globs: "**/*.md"

  test:
    name: ${{ matrix.platform.os_name }} with rust ${{ matrix.toolchain }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os_name: Linux-x86_64
            os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            skip_tests: false
          - os_name: macOS-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            skip_tests: true
          - os_name: Windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            skip_tests: true
        toolchain:
          - stable
          - beta
          - nightly
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Cache cargo and target directories
        uses: Swatinem/rust-cache@v2

      - name: Build binary
        uses: houseabsolute/actions-rust-cross@v0
        with:
          command: build
          target: ${{ matrix.platform.target }}
          toolchain: ${{ matrix.toolchain }}
          args: "--locked --release"
          strip: true

      - name: Run tests
        if: ${{ !matrix.platform.skip_tests }}
        uses: houseabsolute/actions-rust-cross@v0
        with:
          command: test
          target: ${{ matrix.platform.target }}
          toolchain: ${{ matrix.toolchain }}
          args: "--locked --release"

  validate-release:
    name: Validate tagged release metadata
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - lint
      - test
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate version and changelog
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"
          manifest_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"

          if [[ -z "${manifest_version}" ]]; then
            echo "Unable to determine package version from Cargo.toml"
            exit 1
          fi

          if [[ "${manifest_version}" != "${version}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match Cargo.toml version ${manifest_version}"
            exit 1
          fi

          if [[ ! -f CHANGELOG.md ]]; then
            echo "CHANGELOG.md is required for versioned releases"
            exit 1
          fi

          if ! grep -q "^## \[${version}\]" CHANGELOG.md; then
            echo "CHANGELOG.md is missing an entry for ${version}"
            exit 1
          fi

      - name: Validate lockfile
        run: cargo check --locked

  build-main-binaries:
    name: Build main binaries (${{ matrix.platform.os_name }})
    if: github.ref == 'refs/heads/main'
    needs:
      - lint
      - test
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os_name: Linux-x86_64
            os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            binary: hubuum-cli
            archive: hubuum-cli-Linux-x86_64-gnu-main.tar.gz
          - os_name: macOS-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            binary: hubuum-cli
            archive: hubuum-cli-Darwin-aarch64-main.tar.gz
          - os_name: Windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: hubuum-cli.exe
            archive: hubuum-cli-Windows-x86_64-main.zip
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Cache cargo and target directories
        uses: Swatinem/rust-cache@v2

      - name: Build binary
        uses: houseabsolute/actions-rust-cross@v0
        with:
          command: build
          target: ${{ matrix.platform.target }}
          toolchain: stable
          args: "--locked --release"
          strip: true

      - name: Package artifact (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          tar czvf "dist/${{ matrix.platform.archive }}" \
            -C "target/${{ matrix.platform.target }}/release" \
            "${{ matrix.platform.binary }}"

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Compress-Archive `
            -Path "target/${{ matrix.platform.target }}/release/${{ matrix.platform.binary }}" `
            -DestinationPath "dist/${{ matrix.platform.archive }}" `
            -Force

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: main-${{ matrix.platform.os_name }}
          path: dist/${{ matrix.platform.archive }}

  publish-main-release:
    name: Publish rolling main release
    if: github.ref == 'refs/heads/main'
    needs:
      - build-main-binaries
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    concurrency:
      group: publish-main-release
      cancel-in-progress: true
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: main-*
          path: dist
          merge-multiple: true

      - name: Move main release tag
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f main-latest "${GITHUB_SHA}"
          git push --force origin refs/tags/main-latest

      - name: Write release notes
        shell: bash
        run: |
          cat <<EOF > RELEASE_NOTES.md
          Rolling binaries from the latest successful push to \`main\`.

          Commit: ${GITHUB_SHA}
          EOF

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: main-latest
          name: main
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          make_latest: false
          overwrite_files: true
          fail_on_unmatched_files: true
          files: dist/*

  build-versioned-binaries:
    name: Build release binaries (${{ matrix.platform.os_name }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - validate-release
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os_name: Linux-x86_64
            os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            binary: hubuum-cli
            archive: hubuum-cli-Linux-x86_64-gnu.tar.gz
          - os_name: macOS-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            binary: hubuum-cli
            archive: hubuum-cli-Darwin-aarch64.tar.gz
          - os_name: Windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: hubuum-cli.exe
            archive: hubuum-cli-Windows-x86_64.zip
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Cache cargo and target directories
        uses: Swatinem/rust-cache@v2

      - name: Build binary
        uses: houseabsolute/actions-rust-cross@v0
        with:
          command: build
          target: ${{ matrix.platform.target }}
          toolchain: stable
          args: "--locked --release"
          strip: true

      - name: Package artifact (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          tar czvf "dist/${{ matrix.platform.archive }}" \
            -C "target/${{ matrix.platform.target }}/release" \
            "${{ matrix.platform.binary }}"

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Compress-Archive `
            -Path "target/${{ matrix.platform.target }}/release/${{ matrix.platform.binary }}" `
            -DestinationPath "dist/${{ matrix.platform.archive }}" `
            -Force

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform.os_name }}
          path: dist/${{ matrix.platform.archive }}

  publish-versioned-release:
    name: Publish versioned release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-versioned-binaries
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Extract release notes from changelog
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"
          awk -v version="${version}" '
            $0 ~ "^## \\[" version "\\]" { capture = 1 }
            capture && /^## \[/ && $0 !~ "^## \\[" version "\\]" { exit }
            capture { print }
          ' CHANGELOG.md > RELEASE_NOTES.md

          if [[ ! -s RELEASE_NOTES.md ]]; then
            echo "Failed to extract release notes for ${version}"
            exit 1
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: dist/*
